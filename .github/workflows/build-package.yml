name: Build Package
on: [push, workflow_dispatch]

jobs:
  void-build:
    runs-on: ubuntu-latest
    
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Environment and User
        run: |
          # 1. Update and install 'shadow' (needed for useradd)
          xbps-install -Syu || xbps-install -yu xbps
          xbps-install -y git bash curl shadow

          # 2. Create a non-root user named 'builder'
          useradd builder

          # 3. Give 'builder' ownership of the repository
          chown -R builder:builder .

          # 4. Enable restricted packages (REQUIRED for Google Chrome)
          echo "XBPS_ALLOW_RESTRICTED=yes" >> etc/conf

      - name: Bootstrap xbps-src
        run: |
          # Run bootstrap as the 'builder' user
          su builder -c "./xbps-src binary-bootstrap"

      - name: Build Google Chrome
        run: |
          # Run the build as 'builder' using Ethereal mode (-E)
          su builder -c "./xbps-src -E pkg google-chrome"

      - name: Upload .xbps Artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-chrome-package
          path: hostdir/binpkgs/*.xbps
