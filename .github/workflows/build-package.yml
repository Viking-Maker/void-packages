name: Build Package
on: [push, workflow_dispatch]

jobs:
  void-build:
    runs-on: ubuntu-latest
    
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare XBPS
        run: |
          xbps-install -Syu || xbps-install -yu xbps
          xbps-install -y git bash curl

      - name: Bootstrap xbps-src
        # We pass the variable directly before the command here
        run: |
          export ALLOW_CHROOT_AS_ROOT=1
          ./xbps-src binary-bootstrap

      - name: Build My Package
        run: |
          export ALLOW_CHROOT_AS_ROOT=1
          # Use the -E flag (Ethereal mode) which is designed for CI/Docker
          # IMPORTANT: Change 'YOUR_PACKAGE_NAME' to the actual name (e.g., htop)
          ./xbps-src -E pkg google-chrome

      - name: Upload .xbps Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xbps-packages
          path: hostdir/binpkgs/*.xbps
