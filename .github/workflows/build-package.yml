name: Build Package
on: [push, workflow_dispatch]

jobs:
  void-build:
    runs-on: ubuntu-latest
    
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare XBPS and Config
        run: |
          # 1. Update the container
          xbps-install -Syu || xbps-install -yu xbps
          xbps-install -y git bash curl

          # 2. Force the configuration into etc/conf (This bypasses the root check)
          echo "ALLOW_CHROOT_AS_ROOT=1" >> etc/conf
          echo "XBPS_CHROOT_CMD=ethereal" >> etc/conf
          
          # 3. Fix permissions for the workspace (needed for some container setups)
          git config --global --add safe.directory /__w/void-packages/void-packages

      - name: Bootstrap xbps-src
        run: ./xbps-src binary-bootstrap

      - name: Build My Package
        run: |
          # !!! CHANGE 'YOUR_PACKAGE_NAME' TO THE ACTUAL PACKAGE NAME !!!
          ./xbps-src pkg google-chrome

      - name: Upload .xbps Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xbps-packages
          path: hostdir/binpkgs/*.xbps
