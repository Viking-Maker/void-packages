name: Create Symlinks
on: workflow_dispatch

# This permission is required so the robot can push the commit back to your repo
permissions:
  contents: write

jobs:
  make-symlink:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create the Symlink
        run: |
          cd srcpkgs
          # Create the symlink pointing to the libnoise folder
          ln -s libnoise libnoise-devel

      - name: Commit and Push
        run: |
          # Tell git who is making the commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the new symlink and push it back to the master branch
          git add srcpkgs/libnoise-devel
          git commit -m "Add libnoise-devel symlink"
          git push
